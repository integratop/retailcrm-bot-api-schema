name: Feature CI

on:
  push:
    branches: [ 'feature/**' ]
  pull_request:
    branches: [ develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pkgxdev/setup@v4
        with:
          +: pnpm.io@10.15.1 curl.se@8.15.0 nodejs.org@24 curl.se@8.15.0
      - run: pnpm install
      - run: pnpm run test
      - run: pnpm run build
      - run: pnpm run test:node